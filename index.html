<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лендинг с заявкой в Telegram</title>

<style>
body { margin:0; font-family:Arial; }
.container { width:90%; max-width:1000px; margin:auto; }
.hero { background:#f5f5f5; padding:60px 0; text-align:center; }
.btn { background:#ff6b00; color:#fff; padding:12px 25px; border:none; cursor:pointer; }
.section { padding:50px 0; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<section class="hero">
  <div class="container">
    <h1>Ремонт квартир под ключ</h1>
    <p>Оставьте заявку — ответим за 15 минут</p>
    <a href="#form" class="btn">Оставить заявку</a>
  </div>
</section>

<section class="section" id="form">
  <div class="container">
    <h2>Заявка</h2>

    <form id="tgForm">
      <input type="text" id="name" placeholder="Ваше имя" required>
      <input type="tel" id="phone" placeholder="Телефон" required>
      <textarea id="comment" placeholder="Комментарий"></textarea>
      <button class="btn" type="submit">Отправить</button>
    </form>

    <p id="status"></p>
  </div>
</section>

<script>
const TOKEN = "8607792840:AAEHGNjQrcVkSSkNjahebtEubkww7fNr2QE";
const CHAT_ID = "1310692412";

document.getElementById("tgForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const comment = document.getElementById("comment").value;

  const message = `
📩 Новая заявка:
👤 Имя: ${name}
📞 Телефон: ${phone}
💬 Комментарий: ${comment}
`;

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: message
    })
  })
  .then(res => {
    document.getElementById("status").innerText = "Заявка отправлена!";
  })
  .catch(err => {
    document.getElementById("status").innerText = "Ошибка отправки";
  });
});
</script>

</body>
</html>
